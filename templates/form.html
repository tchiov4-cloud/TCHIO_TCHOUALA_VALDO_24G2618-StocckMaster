<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saisie d'Opération | EliteStock</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>

        /* --- NAVIGATION MOBILE --- */

/* 1. Caché par défaut sur ordinateur */
.mobile-nav {
    display: none;
}

/* 2. Uniquement pour Tablettes et Téléphones (max 1024px) */
@media (max-width: 1024px) {
    
    /* On cache la sidebar latérale si elle existe sur la page */
    nav:not(.mobile-nav) {
        display: none !important;
    }

    /* On ajuste le contenu principal pour qu'il ne soit pas caché par la barre */
    main, .container {
        margin-left: 0 !important;
        width: 100% !important;
        padding-bottom: 80px !important; /* Espace pour la barre */
    }

    /* Activation de la barre du bas */
    .mobile-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 70px;
        background: var(--card); /* Utilise la couleur de tes cartes */
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 9999;
        backdrop-filter: blur(10px); /* Effet flou moderne */
    }

    .nav-item {
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: var(--text-dim);
        transition: 0.3s;
    }

    .nav-item .icon {
        font-size: 1.2rem;
        margin-bottom: 4px;
    }

    .nav-item .label {
        font-size: 0.65rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* Style pour le lien actif */
    .nav-item:hover, .nav-item.active {
        color: var(--accent);
    }
}
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --input-bg: #0f172a;
            --border: #334155;
            --nav-bg: rgba(30, 41, 59, 0.95);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        h1 { color: var(--accent); text-align: center; margin-bottom: 25px; font-weight: 800; font-size: 1.5rem; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .full-width { grid-column: span 2; }
        label { color: var(--text-dim); font-size: 0.8rem; font-weight: 600; }

        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .btn-submit {
            grid-column: span 2;
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
        }

        /* --- LOGIQUE D'AFFICHAGE CONDITIONNEL --- */

        /* 1. Caché par défaut sur Ordinateur */
        .bottom-nav {
            display: none; 
        }

        /* 2. Affiché UNIQUEMENT sur téléphone (max 768px) */
        @media (max-width: 768px) {
            body { 
                align-items: flex-start; 
                padding-bottom: 90px; /* On laisse de la place pour la barre */
            }

            .bottom-nav {
                display: flex; /* On l'active ici */
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 70px;
                background: var(--nav-bg);
                backdrop-filter: blur(10px);
                justify-content: space-around;
                align-items: center;
                border-top: 1px solid var(--border);
                z-index: 1000;
            }

            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }

            .nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-decoration: none;
                color: var(--text-dim);
                font-size: 0.7rem;
            }
            .nav-item.active { color: var(--accent); }
        }
        
        /* Lien retour classique pour PC */
        .pc-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
        }
        @media (max-width: 768px) { .pc-link { display: none; } }
    </style>
</head>
<body>
    <nav class="mobile-nav">
    <a href="/dashboard" class="nav-item">
        <span class="icon">🏠</span>
        <span class="label">Accueil</span>
    </a>
    <a href="/stats" class="nav-item">
        <span class="icon">📊</span>
        <span class="label">Stats</span>
    </a>
    <a href="/analyse" class="nav-item">
        <span class="icon">🧠</span>
        <span class="label">Analyse</span>
    </a>
    <a href="/form" class="nav-item">
        <span class="icon">📥</span>
        <span class="label">Saisie</span>
    </a>
    <a href="/affichage" class="nav-item">
        <span class="icon">📜</span>
        <span class="label">Histo.</span>
    </a>
</nav>

<div class="card">
    <h1>Nouvelle Opération</h1>
    
    <form action="/ajouter" method="POST" class="form-grid">
        <div class="form-group">
            <label>Date</label>
            <input type="date" name="date_vente" id="dateInput" required>
        </div>

        <div class="form-group">
            <label>Mouvement</label>
            <select name="type_mouvement" required>
                <option value="sortie">📤 Sortie (Vente)</option>
                <option value="entree">📥 Entrée (Stock)</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>Produit</label>
            <select name="produit" required>
                <option value="Malta">Malta</option>
                <option value="Isembeck">Isembeck</option>
                <option value="Castel">Castel</option>
                <option value="Djino">Djino</option>
                <option value="Mutzig">Mutzig</option>
                <option value="Top">Top</option>
                <option value="Vimto">Vimto</option>
                <option value="Beaufort">Beaufort</option>
                <option value="Guinness">Guinness</option>
                <option value="Kadji">Kadji</option>
            </select>
        </div>

        <div class="form-group">
            <label>Quantité</label>
            <input type="number" name="qte" placeholder="Nombre" required>
        </div>

        <div class="form-group">
            <label>Prix Unitaire</label>
            <input type="number" name="pu" placeholder="FCFA" required>
        </div>

        <input type="hidden" name="type_categorie" value="boisson">

        <button type="submit" class="btn-submit">Valider</button>
    </form>
    
    <a href="/dashboard" class="pc-link">← Retour au Dashboard</a>
</div>

<nav class="bottom-nav">
    <a href="/dashboard" class="nav-item"><span>🏠</span><span>Accueil</span></a>
    <a href="/form" class="nav-item active"><span>📝</span><span>Saisie</span></a>
    <a href="/analyse" class="nav-item"><span>📊</span><span>Analyse</span></a>
    <a href="/affichage" class="nav-item"><span>📜</span><span>Histo.</span></a>
</nav>

<script>
    document.getElementById('dateInput').valueAsDate = new Date();
</script>

</body>
</html>
