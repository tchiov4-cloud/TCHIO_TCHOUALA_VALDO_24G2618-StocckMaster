<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saisie d'Opération | EliteStock</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --input-bg: #0f172a;
            --border: #334155;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--accent);
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            font-size: 1.8rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 600;
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .btn-submit {
            grid-column: span 2;
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3);
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-back:hover {
            color: var(--text);
        }

        /* Désactiver les flèches sur les inputs nombre */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        @media (max-width: 768px) {
            nav {
                display: none; /* Cache la sidebar sur mobile ou transforme-la en menu burger */
            }
            main {
                margin-left: 0;
                width: 100%;
                padding: 15px;
            }
            .kpi-grid {
                grid-template-columns: 1fr; /* 1 carte par ligne sur mobile */
            }
            .main-grid {
                grid-template-columns: 1fr; /* Tableaux et actions l'un sous l'autre */
            }
        }

        /* Pour les Stats : empiler les graphiques */
        @media (max-width: 900px) {
            .grid-charts {
            grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Nouvelle Opération</h1>
    
    <form action="/ajouter"  method="POST" class="form-grid">
        <div class="form-group">
            <label>ID Opération</label>
            <input type="text" name="id" placeholder="Auto" readonly>
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date" name="date_vente" required>
        </div>

        <div class="form-group full-width">
            <label>Nom du Produit</label>
            <select name="produit" required>
                <option value="33 Export">33 Export</option>
                <option value="Coca-Cola">Coca-Cola</option>
                 <option value="Doppel">Doppel</option> 
                <option value="D'jino">D'jino</option>
                 <option value="Heineken">Heineken</option>
                <option value="Malta">Malta</option>
                <option value="Kadji Beer">Kadji Beer</option>
                 <option value="Vimto">Vimto</option>
                <option value="Mutzig">Mutzig</option>
                <option value="Top">Top</option>
            </select>
            
        </div>

        <div class="form-group">
            <label>Type de Catégorie</label>
            <select name="type_categorie" required>
                <option value="alcoolisees">🍷 Alcoolisées</option>
                <option value="non alcoolisees">🥤 Non Alcoolisées</option>
            </select>
        </div>

        <div class="form-group">
            <label>Mouvement</label>
            <select name="type_mouvement" required>
                <option value="entree">📥 Entrée (Stock)</option>
                <option value="sortie">📤 Sortie (Vente)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Quantité</label>
            <input type="number" name="qte" placeholder="nbres casiers ou palettes" required>
        </div>

        <div class="form-group">
            <label>Prix Unitaire (FCFA)</label>
            <input type="number" name="pu" placeholder="0" required>
        </div>

        <div class="form-group">
            <label>Nom du Client</label>
            <input type="text" name="client" placeholder="Nom du client">
        </div>

        <div class="form-group">
            <label>Téléphone</label>
            <input type="tel" name="telephone" placeholder="Numéro de contact">
        </div>

        <button type="submit" class="btn-submit">Enregistrer l'opération</button>
    </form>

    <a href="/dashboard" class="btn-back">← Retour au Tableau de Bord</a>
</div>

<script>
    // Par défaut, mettre la date du jour
    document.querySelector('input[type="date"]').valueAsDate = new Date();
</script>

</body>
</html>
