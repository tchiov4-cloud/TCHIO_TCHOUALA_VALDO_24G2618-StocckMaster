<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saisie d'Opération | EliteStock</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --input-bg: #0f172a;
            --border: #334155;
            --nav-bg: rgba(30, 41, 59, 0.8);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Changé pour mobile */
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px; /* Espace pour la barre de nav mobile */
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--accent);
            text-align: center;
            margin-bottom: 25px;
            font-weight: 800;
            font-size: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .full-width { grid-column: span 2; }

        label { color: var(--text-dim); font-size: 0.8rem; font-weight: 600; }

        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            font-size: 14px;
        }

        input:focus, select:focus { border-color: var(--accent); }

        .btn-submit {
            grid-column: span 2;
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        /* BARRE DE NAVIGATION MOBILE */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.7rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-item i { font-size: 1.2rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }

        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .card { padding: 20px; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Nouvelle Opération</h1>
    
    <form action="/ajouter" method="POST" class="form-grid">
        <div class="form-group">
            <label>Date</label>
            <input type="date" name="date_vente" required>
        </div>

        <div class="form-group">
            <label>Mouvement</label>
            <select name="type_mouvement" required>
                <option value="sortie">📤 Sortie (Vente)</option>
                <option value="entree">📥 Entrée (Stock)</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>Sélectionner le Produit :</label>
            <select name="produit" required>
                <option value="Malta">Malta</option>
                <option value="Isembeck">Isembeck</option>
                <option value="Castel">Castel</option>
                <option value="Djino">Djino</option>
                <option value="Mutzig">Mutzig</option>
                <option value="Top">Top</option>
                <option value="Vimto">Vimto</option>
                <option value="Beaufort">Beaufort</option>
                <option value="Guinness">Guinness</option>
                <option value="Kadji">Kadji</option>
            </select>
        </div>

        <div class="form-group">
            <label>Quantité</label>
            <input type="number" name="qte" placeholder="Ex: 5" required>
        </div>

        <div class="form-group">
            <label>Prix Unitaire</label>
            <input type="number" name="pu" placeholder="FCFA" required>
        </div>

        <div class="form-group">
            <label>Nom du Client</label>
            <input type="text" name="client" placeholder="Optionnel">
        </div>

        <div class="form-group">
            <label>Téléphone</label>
            <input type="tel" name="telephone" placeholder="Optionnel">
        </div>

        <input type="hidden" name="type_categorie" value="alcoolisees">

        <button type="submit" class="btn-submit">Valider l'opération</button>
    </form>
</div>

<nav class="bottom-nav">
    <a href="/dashboard" class="nav-item">
        <span>🏠</span>
        <span>Accueil</span>
    </a>
    <a href="/form" class="nav-item active">
        <span>📝</span>
        <span>Saisie</span>
    </a>
    <a href="/analyse" class="nav-item">
        <span>📊</span>
        <span>Analyse</span>
    </a>
    <a href="/affichage" class="nav-item">
        <span>📜</span>
        <span>Histo.</span>
    </a>
</nav>

<script>
    document.querySelector('input[type="date"]').valueAsDate = new Date();
</script>

</body>
</html>
