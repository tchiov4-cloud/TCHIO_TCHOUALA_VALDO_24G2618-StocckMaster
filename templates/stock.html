<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Journal des Opérations | EliteStock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>

        /* --- NAVIGATION MOBILE --- */

/* 1. Caché par défaut sur ordinateur */
.mobile-nav {
    display: none;
}

/* 2. Uniquement pour Tablettes et Téléphones (max 1024px) */
@media (max-width: 1024px) {
    
    /* On cache la sidebar latérale si elle existe sur la page */
    nav:not(.mobile-nav) {
        display: none !important;
    }

    /* On ajuste le contenu principal pour qu'il ne soit pas caché par la barre */
    main, .container {
        margin-left: 0 !important;
        width: 100% !important;
        padding-bottom: 80px !important; /* Espace pour la barre */
    }

    /* Activation de la barre du bas */
    .mobile-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 70px;
        background: var(--card); /* Utilise la couleur de tes cartes */
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 9999;
        backdrop-filter: blur(10px); /* Effet flou moderne */
    }

    .nav-item {
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: var(--text-dim);
        transition: 0.3s;
    }

    .nav-item .icon {
        font-size: 1.2rem;
        margin-bottom: 4px;
    }

    .nav-item .label {
        font-size: 0.65rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* Style pour le lien actif */
    .nav-item:hover, .nav-item.active {
        color: var(--accent);
    }
}
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn {
            background: var(--accent);
            color: var(--bg);
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
        }

        .glass-card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-dim); padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .ca-box {
            margin-top: 20px;
            text-align: right;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent);
        }

        /* Pour le Dashboard : empiler les KPI sur mobile */
        @media (max-width: 768px) {
            nav {
                display: none; /* Cache la sidebar sur mobile ou transforme-la en menu burger */
            }
            main {
                margin-left: 0;
                width: 100%;
                padding: 15px;
            }
            .kpi-grid {
                grid-template-columns: 1fr; /* 1 carte par ligne sur mobile */
            }
            .main-grid {
                grid-template-columns: 1fr; /* Tableaux et actions l'un sous l'autre */
            }
        }

        /* Pour les Stats : empiler les graphiques */
        @media (max-width: 900px) {
            .grid-charts {
            grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <nav class="mobile-nav">
    <a href="/dashboard" class="nav-item">
        <span class="icon">🏠</span>
        <span class="label">Accueil</span>
    </a>
    <a href="/stats" class="nav-item">
        <span class="icon">📊</span>
        <span class="label">Stats</span>
    </a>
    <a href="/analyse" class="nav-item">
        <span class="icon">🧠</span>
        <span class="label">Analyse</span>
    </a>
    <a href="/form" class="nav-item">
        <span class="icon">📥</span>
        <span class="label">Saisie</span>
    </a>
    <a href="/affichage" class="nav-item">
        <span class="icon">📜</span>
        <span class="label">Histo.</span>
    </a>
</nav>
    
<div class="container">
    <header>
        <h1>📜 Journal des Opérations</h1>
        <div>
            <a href="/dashboard" class="btn" style="background: transparent; color: white; border: 1px solid white; margin-right: 10px;">Tableau de Bord</a>
            <a href="/form" class="btn">Nouvelle Opération</a>
        </div>
    </header>

    <div class="glass-card">
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Produit</th>
                        <th>Client</th>
                        <th>Téléphone</th>
                        <th>Catégorie</th>
                        <th>Qté</th>
                        <th>P.U</th>
                        <th>Mouvement</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
                    __LIGNES__
                </tbody>
            </table>
        </div>
    </div>

    <div class="ca-box">
        Chiffre d'Affaires Global : __CA__ FCFA
    </div>
</div>

</body>
</html>
